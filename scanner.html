<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ماسح QR - حفل حاتم ومآثر</title>
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<script src="qrcode.min.js"></script>
<style>
  :root {
    --night:#1B5E20; --night-2:#2E7D32; --gold:#D4AF37; --gold-light:#F0EAD6;
    --ivory:#FAF6E9; --sand:#F0EAD6; --ink:#1B2E1C; --muted:#8C8676;
    --red:#B3453A; --green-ok:#1e8449;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family:'Amiri',serif; background:var(--ivory); color:var(--ink); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }

  .header { text-align:center; margin-bottom:20px; }
  .header h1 { font-family:'Aref Ruqaa',serif; font-size:28px; color:var(--night); }
  .header p { font-size:14px; color:var(--muted); margin-top:4px; }

  #reader { width:100%; max-width:400px; border-radius:16px; overflow:hidden; box-shadow:0 8px 30px rgba(27,94,32,.15); border:3px solid var(--night); }
  
  /* تخصيص أزرار وزوايا مكتبة qr-scanner */
  #reader video { border-radius:14px; }
  #reader button { background:var(--night) !important; color:var(--gold-light) !important; border:none !important; padding:8px 16px !important; border-radius:8px !important; font-family:'Amiri',serif !important; cursor:pointer !important; margin:5px !important; }

  .status-box { margin-top:20px; width:100%; max-width:400px; text-align:center; }
  .alert { padding:16px; border-radius:12px; font-size:18px; font-weight:700; display:none; margin-bottom:12px; }
  .alert-success { background:#eafaf1; color:var(--green-ok); border:1px solid #a9dfbf; display:block; }
  .alert-error { background:#ffeaea; color:var(--red); border:1px solid #f5c6c6; display:block; }
  .alert-warn { background:#fff8e1; color:#f39c12; border:1px solid #ffe082; display:block; }

  .manual-input { margin-top:16px; display:flex; gap:8px; width:100%; max-width:400px; }
  .manual-input input { flex:1; padding:12px 16px; border:1.5px solid var(--sand); border-radius:10px; font-family:'Amiri',serif; font-size:16px; text-align:center; outline:none; color:var(--ink); }
  .manual-input input:focus { border-color:var(--night); }
  .manual-input button { padding:12px 20px; background:var(--night); color:var(--gold-light); border:none; border-radius:10px; font-family:'Amiri',serif; font-size:15px; font-weight:700; cursor:pointer; }
  .manual-input button:hover { background:var(--night-2); }

  .back-btn { margin-top:24px; color:var(--muted); text-decoration:none; font-size:14px; }
  .back-btn:hover { color:var(--night); }
</style>
</head>
<body>

<div class="header">
  <h1>📷 ماسح رمز الدخول</h1>
  <p>حاتم & مآثر · وجه الكاميرا نحو رمز QR</p>
</div>

<div id="reader"></div>

<div class="status-box">
  <div class="alert" id="result-alert"></div>
</div>

<div class="manual-input">
  <input type="text" id="manual-code" placeholder="أو أدخل الكود يدوياً">
  <button onclick="checkManualCode()">تأكيد</button>
</div>

<a href="admin.html" class="back-btn">↩ العودة للوحة الإدارة</a>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw6tbpEtIuf-_3SWGi1f902zbyGklacxFIPNk33sXZPvoD_DGEah5ktCSQmZN23E3y0/exec';

let isProcessing = false;

function onScanSuccess(decodedText) {
  if (isProcessing) return;
  
  // الرمز يُولّد بصيغة WEDDING:CODE:NAME
  const parts = decodedText.split(':');
  if (parts.length >= 2 && parts[0] === 'WEDDING') {
    const code = parts[1];
    isProcessing = true;
    checkInGuest(code);
  } else {
    // إذا كان الرمز مختلفاً، نحاول استخدامه مباشرة
    isProcessing = true;
    checkInGuest(decodedText);
  }
}

async function checkInGuest(code) {
  showAlert('⏳ جاري التحقق من الكود...', 'warn');
  try {
    const res = await callScript({ action:'checkin', code:code });
    if (res.status === 'success') {
      showAlert('✅ تم تسجيل حضور: ' + (res.name || code), 'success');
      vibrate(200);
    } else if (res.status === 'duplicate') {
      showAlert('⚠️ ' + (res.name || code) + ' سجّل دخوله مسبقاً', 'warn');
      vibrate([100, 50, 100]);
    } else {
      showAlert('❌ الكود غير موجود', 'error');
      vibrate([100, 50, 100, 50, 100]);
    }
  } catch(e) {
    showAlert('⚠️ تعذّر الاتصال بالخادم', 'error');
  }
  
  // الانتظار 3 ثواني قبل السماح بمسح كود آخر
  setTimeout(() => {
    isProcessing = false;
    document.getElementById('result-alert').style.display = 'none';
  }, 3000);
}

function checkManualCode() {
  const code = document.getElementById('manual-code').value.trim();
  if (!code || isProcessing) return;
  isProcessing = true;
  checkInGuest(code);
}

function showAlert(msg, type) {
  const el = document.getElementById('result-alert');
  el.textContent = msg;
  el.className = 'alert alert-' + type;
}

function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

// JSONP
function callScriptOnce(params, timeoutMs) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*1e6);
    const script = document.createElement('script');
    const timer = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, timeoutMs || 30000);
    function cleanup(){ clearTimeout(timer); try{delete window[cb];}catch(e){window[cb]=undefined;} if(script.parentNode) script.parentNode.removeChild(script); }
    window[cb] = (data) => { cleanup(); resolve(data); };
    const qs = new URLSearchParams(Object.assign({}, params, {callback:cb})).toString();
    script.src = SCRIPT_URL + '?' + qs + '&_=' + Date.now();
    script.onerror = () => { cleanup(); reject(new Error('network')); };
    document.head.appendChild(script);
  });
}
async function callScript(params, attempts) {
  attempts = attempts || 3; let lastErr;
  for (let i = 0; i < attempts; i++) {
    try { return await callScriptOnce(params, 30000); }
    catch (e) { lastErr = e; await new Promise(r => setTimeout(r, 1500)); }
  }
  throw lastErr;
}

// تشغيل الماسح
const html5QrCode = new Html5Qrcode("reader");
html5QrCode.start(
  { facingMode: "environment" }, // الكاميرا الخلفية
  { fps: 10, qrbox: { width: 250, height: 250 } },
  onScanSuccess,
  (errorMessage) => { /* تجاهل أخطاء القراءة المستمرة */ }
).catch(err => {
  showAlert('⚠️ تعذّر الوصول للكاميرا. تأكد من منح الإذن.', 'error');
});
</script>
</body>
</html>
